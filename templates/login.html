{% extends "base.html" %}

{% block page_header %}{% endblock %}

{% block content %}
<div class="row justify-content-center min-vh-100 align-items-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-tshirt fa-4x" style="color: var(--secondary-pink);"></i>
                    <h3 class="mt-3">نظام معمل الخياطات</h3>
                    <p class="text-muted">تسجيل الدخول إلى النظام</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-user"></i> اسم المستخدم
                        </label>
                        <input type="text" class="form-control" name="username" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-lock"></i> كلمة المرور
                        </label>
                        <input type="password" class="form-control" name="password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-sign-in-alt"></i> دخول
                    </button>
                </form>

                <hr class="my-4">

                <div class="text-center text-muted small">
                    <i class="fas fa-info-circle"></i> للدخول التجريبي: admin / admin123
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
