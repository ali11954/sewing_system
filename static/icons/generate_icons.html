<!DOCTYPE html>
<html>
<head>
    <title>توليد أيقونات PWA</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; direction: rtl; }
        .icon { display: inline-block; margin: 10px; text-align: center; }
        canvas { border: 1px solid #ddd; border-radius: 20px; }
        button { background: #E8B4B8; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>توليد أيقونات PWA لنظام معمل الخياطات</h1>
    <div id="icons"></div>
    <button onclick="downloadAll()">تحميل جميع الأيقونات</button>

    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        const iconsDiv = document.getElementById('icons');
        const iconsData = {};

        sizes.forEach(size => {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // خلفية
            ctx.fillStyle = '#E8B4B8';
            ctx.fillRect(0, 0, size, size);

            // رسم شكل بسيط (ماكينة خياطة)
            ctx.fillStyle = '#FFFFFF';
            ctx.font = `bold ${size * 0.4}px "Tajawal"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🧵', size/2, size/2);

            // إطار
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = size * 0.03;
            ctx.strokeRect(size * 0.1, size * 0.1, size * 0.8, size * 0.8);

            const div = document.createElement('div');
            div.className = 'icon';
            div.innerHTML = `<strong>${size}x${size}</strong><br>`;
            div.appendChild(canvas);
            iconsDiv.appendChild(div);

            iconsData[size] = canvas.toDataURL();
        });

        function downloadAll() {
            sizes.forEach(size => {
                const link = document.createElement('a');
                link.download = `icon-${size}.png`;
                link.href = iconsData[size];
                link.click();
            });
            alert('تم تحميل جميع الأيقونات!');
        }
    </script>
</body>
</html>
